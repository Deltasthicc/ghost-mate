[pytest]
asyncio_mode = auto
testpaths = host/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    asyncio: mark test as async
    slow: mark test as slow-running
    integration: mark test as a full-integration test
    hardware: mark test as requiring real hardware
